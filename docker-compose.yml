version: "3.9"

services:

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: support-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Streamlit app
  app:
    build: .
    container_name: support-rag-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs  # Mount docs so they're always fresh

volumes:
  qdrant_data: