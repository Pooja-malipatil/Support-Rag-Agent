<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Knowledge Copilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e2330;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f8fafc;
    }

    header span {
      font-size: 12px;
      color: #64748b;
      background: #1e2330;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.user .bubble {
      background: #2563eb;
      color: white;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      max-width: 70%;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.assistant .bubble {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 4px 16px 16px 16px;
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.6;
    }

    .answer-text {
      color: #e2e8f0;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .no-answer {
      color: #94a3b8;
      font-style: italic;
    }

    .metadata {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2d3748;
    }

    .badge {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 500;
    }

    .badge.confidence {
      background: #1a2744;
      color: #60a5fa;
      border: 1px solid #1e40af;
    }

    .badge.supported {
      background: #14291e;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .badge.partial {
      background: #2a2008;
      color: #fbbf24;
      border: 1px solid #92400e;
    }

    .badge.unsupported {
      background: #2a1010;
      color: #f87171;
      border: 1px solid #991b1b;
    }

    .chunks-section {
      margin-top: 12px;
    }

    .chunks-toggle {
      background: none;
      border: none;
      color: #64748b;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: underline;
    }

    .chunks-toggle:hover { color: #94a3b8; }

    .chunks-list {
      display: none;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chunk-item {
      background: #151b28;
      border: 1px solid #1e2330;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
    }

    .chunk-id {
      color: #60a5fa;
      font-family: monospace;
      margin-bottom: 4px;
    }

    .chunk-preview {
      color: #64748b;
      line-height: 1.4;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 14px;
      padding: 12px 0;
    }

    .dots span {
      animation: blink 1.4s infinite;
      font-size: 20px;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #1e2330;
      background: #0f1117;
    }

    .input-row {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .options {
      max-width: 780px;
      margin: 0 auto 10px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .options label {
      font-size: 12px;
      color: #64748b;
    }

    .options select {
      background: #1e2330;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .options input[type="checkbox"] { accent-color: #2563eb; }

    textarea {
      flex: 1;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 15px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      min-height: 48px;
      max-height: 160px;
    }

    textarea:focus { border-color: #2563eb; }

    textarea::placeholder { color: #475569; }

    button.send {
      background: #2563eb;
      border: none;
      border-radius: 10px;
      color: white;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button.send:hover { background: #1d4ed8; }
    button.send:disabled { background: #1e2330; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #475569;
    }

    .empty-state h2 { font-size: 20px; color: #64748b; }
    .empty-state p  { font-size: 14px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .suggestion {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover {
      background: #2d3748;
      color: #e2e8f0;
      border-color: #4b5563;
    }
  </style>
</head>
<body>

<header>
  <h1>Support Knowledge Copilot</h1>
  <span>RAG + Citation Verification</span>
</header>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <h2>Ask anything about the docs</h2>
    <p>Answers are grounded in documentation with verified citations</p>
    <div class="suggestions">
      <div class="suggestion" onclick="fillQuestion(this)">How do I reset my API key?</div>
      <div class="suggestion" onclick="fillQuestion(this)">What happens if I exceed rate limits?</div>
      <div class="suggestion" onclick="fillQuestion(this)">How do I store my API key securely?</div>
      <div class="suggestion" onclick="fillQuestion(this)">What is the refund policy?</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="options">
    <label>Mode:
      <select id="modeSelect">
        <option value="standard">Standard</option>
        <option value="rewrite">Query Rewrite</option>
        <option value="multi_query">Multi-Query</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="rerankCheck"> Re-rank
    </label>
  </div>
  <div class="input-row">
    <textarea
      id="questionInput"
      placeholder="Ask a question about the documentation..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send" id="sendBtn" onclick="sendQuestion()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function fillQuestion(el) {
    document.getElementById('questionInput').value = el.textContent;
    document.getElementById('questionInput').focus();
  }

  function verdictBadge(verdict) {
    const classes = {
      'SUPPORTED':   'supported',
      'PARTIAL':     'partial',
      'UNSUPPORTED': 'unsupported',
      'NOT_FOUND':   'unsupported',
    };
    const cls = classes[verdict] || 'partial';
    return `<span class="badge ${cls}">${verdict}</span>`;
  }

  async function sendQuestion() {
    const input   = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const question = input.value.trim();
    if (!question) return;

    const mode   = document.getElementById('modeSelect').value;
    const rerank = document.getElementById('rerankCheck').checked;

    // Hide empty state
    document.getElementById('emptyState').style.display = 'none';

    // Add user message
    appendMessage('user', `<div class="bubble">${escapeHtml(question)}</div>`);

    // Add loading indicator
    const loadingId = 'loading-' + Date.now();
    appendMessage('assistant',
      `<div class="bubble" id="${loadingId}">
        <div class="loading">
          <div class="dots">
            <span>•</span><span>•</span><span>•</span>
          </div>
          Thinking...
        </div>
       </div>`
    );

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, mode, rerank })
      });

      const data = await res.json();
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.parentElement.remove();

      renderAnswer(data);

    } catch (err) {
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.parentElement.remove();
      appendMessage('assistant',
        `<div class="bubble">
          <div class="answer-text no-answer">
            Error connecting to the server. Make sure the API is running.
          </div>
         </div>`
      );
    }

    sendBtn.disabled = false;
    scrollToBottom();
  }

  function renderAnswer(data) {
    const answerClass = data.no_answer ? 'no-answer' : '';

    // Build citations row
    let citationsHtml = '';
    if (data.verdicts && data.verdicts.length > 0) {
      citationsHtml = data.verdicts.map(v =>
        `<span title="${v.chunk_id}">${verdictBadge(v.verdict)} ${v.chunk_id.split('-chunk-')[0]}…</span>`
      ).join(' ');
    }

    // Build confidence badge
    const confColor = data.confidence >= 50 ? '#60a5fa' : '#94a3b8';
    const confBadge = data.no_answer
      ? ''
      : `<span class="badge confidence">confidence: ${data.confidence}/100</span>`;

    // Build retrieved chunks section
    let chunksHtml = '';
    if (data.retrieved && data.retrieved.length > 0) {
      const items = data.retrieved.map(c =>
        `<div class="chunk-item">
          <div class="chunk-id">${c.chunk_id}</div>
          <div class="chunk-preview">${escapeHtml(c.preview)}</div>
        </div>`
      ).join('');
      chunksHtml = `
        <div class="chunks-section">
          <div style="font-size:12px;color:#64748b;margin-top:8px;">
            Retrieved ${data.retrieved.length} chunks
          </div>
          <div class="chunks-list">${items}</div>
        </div>`;
    }

    const html = `
      <div class="bubble">
        <div class="answer-text ${answerClass}">${escapeHtml(data.answer)}</div>
        <div class="metadata">
          ${confBadge}
          ${citationsHtml}
        </div>
        ${chunksHtml}
      </div>`;

    appendMessage('assistant', html);
    scrollToBottom();
  }

  function appendMessage(role, html) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = html;
    chatArea.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    const chatArea = document.getElementById('chatArea');
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
